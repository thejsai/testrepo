name: Python CI/CD — Basic App

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'requirements**.txt'
      - '.github/workflows/**'
      - 'Dockerfile'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements**.txt'
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PYTHON_DEFAULT_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_DEFAULT_TIMEOUT: "100"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Run pre-commit on all files
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ruff mypy pre-commit

      - name: Run ruff lint
        run: |
          ruff check . --output-format=github --statistics

      - name: Run ruff format check
        run: ruff format --check --diff .

      - name: Run mypy type checking
        run: |
          mypy src/ --ignore-missing-imports --warn-return-any --warn-unused-ignores --show-error-codes
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install "bandit[toml]" pip-audit

      - name: Audit dependencies for CVEs (pip-audit)
        run: |
          if [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt --format json --output pip-audit-report.json --progress-spinner off || true
          else
            echo "No requirements.txt found; skipping pip-audit"
          fi
        continue-on-error: true

      - name: Print pip-audit summary
        if: always()
        run: |
          if [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt --progress-spinner off || true
          else
            echo "No requirements.txt found"
          fi

      - name: Run Bandit (code security analysis)
        id: bandit
        run: |
          bandit -r src/ app/ --severity-level medium --confidence-level medium --exclude .venv,tests/ --format json --output bandit-report.json || true
        continue-on-error: true

      - name: Print Bandit findings (human-readable)
        if: always()
        run: |
          python -c "import json, sys
          try:
            data = json.load(open('bandit-report.json'))
            issues = data.get('results', [])
            if not issues:
              print('✅ No Bandit findings')
            for i in issues:
              print(f\"[{i['issue_severity']}] {i['filename']}:{i['line_number']} — {i['issue_text']}\")
            if any(i['issue_severity'] == 'HIGH' for i in issues):
              sys.exit(1)
          except FileNotFoundError:
            print('No bandit report generated')"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [lint, security]
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        os:
          - ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Install editable install for local package if present
          if [ -f setup.py ] || [ -f pyproject.toml ]; then
            pip install -e . || true
          fi
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true
        env:
          APP_ENV: testing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.os }}
          path: pytest-report.xml
          retention-days: 7

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: pip install build twine cyclonedx-bom

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify package metadata (twine check)
        run: twine check dist/* || true

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          cyclonedx-py environment --output-format json --output-file sbom.json || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages-${{ github.run_id }}
          path: |
            dist/
            sbom.json
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ github.event.inputs.publish_to_testpypi == 'true' && 'testpypi' || 'pypi' }}
      url: ${{ github.event.inputs.publish_to_testpypi == 'true' && 'https://test.pypi.org/p/your-package' || 'https://pypi.org/p/your-package' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages-${{ github.run_id }}
          path: dist/

      - name: Publish to PyPI (OIDC Trusted Publishing)
        if: github.event.inputs.publish_to_testpypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI (manual trigger only)
        if: github.event.inputs.publish_to_testpypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages-${{ github.run_id }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.json
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
