name: Python CI/CD — Basic App

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'requirements**.txt'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements**.txt'
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHON_DEFAULT_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_DEFAULT_TIMEOUT: "100"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Run pre-commit on all files
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install project and linting tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install -e .
          pip install "ruff==0.4.4" "mypy==1.10.0" "pre-commit==3.7.1"

      - name: Run ruff lint
        run: |
          ruff check . \
            --output-format=github \
            --statistics

      - name: Run ruff format check
        run: ruff format --check --diff .

      - name: Run mypy type checking
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --warn-return-any \
            --warn-unused-ignores \
            --show-error-codes
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install -e .
          pip install "bandit[toml]==1.7.8" "pip-audit==2.7.3"

      - name: Audit dependencies for CVEs (pip-audit)
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --progress-spinner off
        continue-on-error: true

      - name: Print pip-audit summary
        if: always()
        run: pip-audit --requirement requirements.txt --progress-spinner off || true

      - name: Run Bandit (code security analysis)
        id: bandit
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude .venv,tests/ \
            --format json \
            --output bandit-report.json
        continue-on-error: true

      - name: Print Bandit findings (human-readable)
        if: always()
        run: |
          python -c "
          import json, sys
          try:
            data = json.load(open('bandit-report.json'))
            issues = data.get('results', [])
            if not issues:
              print('✅ No Bandit findings')
            for i in issues:
              print(f\"[{i['issue_severity']}] {i['filename']}:{i['line_number']} — {i['issue_text']}\")
            if any(i['issue_severity'] == 'HIGH' for i in issues):
              sys.exit(1)
          except FileNotFoundError:
            print('No bandit report generated')
          "

      - name: Upload security reports
        uses: actions/upload-artifact@v4.3.3
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  test:
    name: Test (no tests configured)
    runs-on: ubuntu-latest
    needs: [lint, security]

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
        os:
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install project (no tests to run)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install -e .

      - name: No tests configured
        run: echo "No test suite found in this repository. Skipping pytest."

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install -e .
          pip install build twine cyclonedx-bom

      - name: Build wheel and source distribution
        run: pip install build && python -m build

      - name: Verify package metadata (twine check)
        run: twine check dist/*

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          pip install -r requirements.txt
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.json
          echo "SBOM generated. Component count:"
          python -c "import json; d=json.load(open('sbom.json')); print(len(d.get('components', [])))"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: dist-packages-${{ github.run_id }}
          path: |
            dist/
            sbom.json
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    environment:
      name: ${{ github.event.inputs.publish_to_testpypi == 'true' && 'testpypi' || 'pypi' }}
      url: ${{ github.event.inputs.publish_to_testpypi == 'true' && 'https://test.pypi.org/p/your-package' || 'https://pypi.org/p/your-package' }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: dist-packages-${{ github.run_id }}
          path: dist/

      - name: Publish to PyPI (OIDC Trusted Publishing)
        if: github.event.inputs.publish_to_testpypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI (manual trigger only)
        if: github.event.inputs.publish_to_testpypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: dist-packages-${{ github.run_id }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.5
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.json
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}