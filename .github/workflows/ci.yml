name: Python CI — Build

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'requirements*.txt'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday 08:00 UTC
  workflow_dispatch: {}  # Manual trigger

permissions:
  contents: read

env:
  PYTHON_DEFAULT_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    name: Build package (ubuntu-latest, Python ${{ env.PYTHON_DEFAULT_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5.1.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install project dependencies and editable package
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Install the package in editable mode for local imports (as specified)
          pip install -e .

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build
        # Produces artifacts in dist/

      - name: List built artifacts
        run: ls -al dist || true

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: dist-packages-${{ github.run_id }}
          path: dist/
          retention-days: 7